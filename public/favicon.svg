<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Toolbox</title>
  <defs>
    <!-- userSpaceOnUse so gradient fills match the background at every position -->
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- App-icon background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- Carrying handle (arch) -->
  <path d="M11 14 L11 9 Q11 6.5 16 6.5 Q21 6.5 21 9 L21 14"
        fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Box body (lid + body as one rectangle) -->
  <rect x="3" y="13" width="26" height="16" rx="2.5" fill="white"/>

  <!-- Lid seam — gradient fill matches background, reads as a cut-through -->
  <rect x="3" y="19" width="26" height="2" fill="url(#g)"/>

  <!-- Centre latch, straddling the seam -->
  <rect x="12" y="17.5" width="8" height="3.5" rx="1.5" fill="url(#g)"/>
</svg>
