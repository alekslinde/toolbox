<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; background: #fff; color: #1e293b; width: 380px; overflow-x: hidden; }

  /* Header */
  .header { padding: 14px 16px 10px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 13px; font-weight: 600; color: #1e293b; }
  .header-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .close-btn { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; }
  .close-btn:hover { background: #f1f5f9; color: #475569; }

  /* URL input section */
  .url-section { padding: 14px 16px 12px; border-bottom: 1px solid #e2e8f0; }
  .url-row { display: flex; gap: 8px; }
  .url-input {
    flex: 1; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 7px 10px;
    font-size: 12px; color: #1e293b; background: #f8fafc; outline: none;
    transition: border-color 0.15s;
  }
  .url-input:focus { border-color: #818cf8; background: #fff; }
  .extract-btn {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: #fff; border: none; border-radius: 6px; padding: 7px 14px;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .extract-btn:hover { opacity: 0.9; }
  .extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status bar */
  .status { padding: 8px 16px; font-size: 11px; min-height: 28px; display: flex; align-items: center; }
  .status.info { color: #64748b; }
  .status.ok { color: #059669; }
  .status.err { color: #dc2626; }
  .status.hidden { display: none; }

  /* Results panel */
  .results { display: none; flex-direction: column; border-top: 1px solid #e2e8f0; }
  .results.visible { display: flex; }

  /* Brand header row */
  .brand-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f1f5f9; }
  .brand-favicon { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #e2e8f0; object-fit: contain; }
  .brand-name { font-size: 13px; font-weight: 600; color: #1e293b; }
  .brand-domain { font-size: 11px; color: #94a3b8; }

  /* Colors section */
  .section { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 8px; }
  .color-swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .color-swatch {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.08);
    cursor: pointer; position: relative; flex-shrink: 0;
    transition: transform 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch-tooltip {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #fff; font-size: 10px; padding: 2px 5px;
    border-radius: 3px; white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
  }
  .color-swatch:hover .color-swatch-tooltip { opacity: 1; }

  /* Fonts section */
  .font-list { display: flex; flex-direction: column; gap: 4px; }
  .font-item { display: flex; justify-content: space-between; align-items: center; }
  .font-name { font-size: 12px; color: #334155; font-weight: 500; }
  .font-meta { font-size: 10px; color: #94a3b8; }

  /* Apply options */
  .apply-section { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
  .checkboxes { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .checkbox-row input[type="checkbox"] { width: 14px; height: 14px; accent-color: #6366f1; cursor: pointer; }
  .checkbox-label { font-size: 12px; color: #334155; }
  .checkbox-desc { font-size: 10px; color: #94a3b8; margin-left: 22px; margin-top: -4px; }
  .apply-btn {
    width: 100%; background: linear-gradient(135deg, #6366f1, #a855f7);
    color: #fff; border: none; border-radius: 6px; padding: 9px 16px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  .apply-btn:hover { opacity: 0.9; }
  .apply-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Done feedback */
  .done-feedback { padding: 10px 16px; font-size: 12px; display: none; align-items: center; gap: 6px; }
  .done-feedback.visible { display: flex; }
  .done-feedback.ok { color: #059669; }
  .done-feedback.err { color: #dc2626; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Brand Assets Extractor</div>
    <div class="header-sub">Extract colours &amp; fonts, apply to Figma</div>
  </div>
  <button class="close-btn" id="closeBtn" title="Close plugin">&times;</button>
</div>

<div class="url-section">
  <div class="url-row">
    <input id="urlInput" class="url-input" type="url" placeholder="https://example.com" />
    <button id="extractBtn" class="extract-btn">Extract</button>
  </div>
</div>

<div id="statusBar" class="status hidden"></div>

<div id="resultsPanel" class="results">

  <div class="brand-header">
    <img id="brandFavicon" class="brand-favicon" src="" alt="" onerror="this.style.display='none'" />
    <div>
      <div id="brandName" class="brand-name"></div>
      <div id="brandDomain" class="brand-domain"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Brand Colours</div>
    <div id="colorSwatches" class="color-swatches"></div>
  </div>

  <div class="section">
    <div class="section-label">Typography</div>
    <div id="fontList" class="font-list"></div>
  </div>

  <div class="apply-section">
    <div class="checkboxes">
      <div>
        <label class="checkbox-row">
          <input type="checkbox" id="optStyles" checked />
          <span class="checkbox-label">Color Styles</span>
        </label>
        <div class="checkbox-desc">Create paint styles for each brand colour</div>
      </div>
      <div>
        <label class="checkbox-row">
          <input type="checkbox" id="optVariables" checked />
          <span class="checkbox-label">Ionic Variables</span>
        </label>
        <div class="checkbox-desc">Generate all 9 Ionic colour roles as variables</div>
      </div>
      <div>
        <label class="checkbox-row">
          <input type="checkbox" id="optFrame" checked />
          <span class="checkbox-label">Style Guide Frame</span>
        </label>
        <div class="checkbox-desc">Place a brand style guide frame on the canvas</div>
      </div>
    </div>
    <button id="applyBtn" class="apply-btn">Apply to Figma</button>
  </div>

  <div id="doneFeedback" class="done-feedback"></div>

</div>

<script src="dist/ui.js"></script>
</body>
</html>
